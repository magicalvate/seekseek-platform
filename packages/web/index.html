<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SeekSeek Platform</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="logo">SeekSeek</div>
      <ul class="nav-list">
        <li class="nav-item active">插件商店</li>
      </ul>
    </nav>

    <main class="main">
      <div class="page-header">
        <h1>插件商店</h1>
        <p>扩展 SeekSeek 的能力，查看和管理 MCP 服务与 Skills。</p>
      </div>

      <section class="section">
        <h2 class="section-title">MCP Servers</h2>
        <div class="grid" id="mcp-grid"></div>
      </section>

      <section class="section">
        <h2 class="section-title">Skills</h2>
        <div class="grid" id="skills-grid"></div>
      </section>
    </main>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
